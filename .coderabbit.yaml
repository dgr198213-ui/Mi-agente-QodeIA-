# Versión de la configuración de CodeRabbit
version: "2"

# Idioma de los comentarios y resúmenes
language: "es-ES"

reviews:
  # Perfil de revisión equilibrado y profesional
  profile: "assertive"
  
  # Habilitar resúmenes automáticos de alto nivel
  high_level_summary: true
  
  # No revisar Pull Requests en estado de borrador (Draft)
  ignore_draft_pr: true
  
  # Filtros globales para evitar ruido en la revisión
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/vendor/**"
    - "!**/*.test.js"
    - "!**/*.spec.ts"
    - "!**/package-lock.json"
    - "!**/yarn.lock"

  # Instrucciones personalizadas basadas en Clean Architecture
  instructions: |
    Como asistente experto, tu revisión debe priorizar la mantenibilidad a largo plazo siguiendo estos principios:
    1. [span_0](start_span)[span_1](start_span)Regla de Dependencia: Verifica que las dependencias siempre apunten hacia adentro, hacia las reglas de negocio (Entidades y Casos de Uso)[span_0](end_span)[span_1](end_span).
    2. [span_2](start_span)[span_3](start_span)Aislamiento del Dominio: El núcleo de la lógica no debe conocer detalles de la infraestructura como bases de datos, frameworks o la interfaz de usuario[span_2](end_span)[span_3](end_span).
    3. [span_4](start_span)[span_5](start_span)Cruce de Límites: Asegúrate de que los datos que cruzan fronteras entre capas lo hagan mediante estructuras de datos simples o DTOs, evitando que objetos de la base de datos se filtren en la lógica de negocio[span_4](end_span)[span_5](end_span).
    4. [span_6](start_span)[span_7](start_span)Estabilidad: Las políticas de alto nivel (reglas de negocio) deben ser más estables que los detalles técnicos[span_6](end_span)[span_7](end_span).
    5. [span_8](start_span)Inversión de Dependencias: Valida el uso de interfaces o "ports" para desacoplar la lógica de las implementaciones externas[span_8](end_span).

chat:
  # Permite interactuar con CodeRabbit mediante comentarios para discutir cambios
  enabled: true

knowledge_base:
  # Detectar automáticamente reglas de otros archivos como .cursorrules o CLAUDE.md
  code_guidelines:
    enabled: true
